name: Test

on:
  push:
    paths:
      - 'install.ps1'
      - 'profile.ps1'
  pull_request:
    paths:
      - 'install.ps1'
      - 'profile.ps1'

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run install.ps1
        shell: pwsh
        run: .\install.ps1

      - name: Verify installation
        shell: pwsh
        run: |
          $scoopPath = scoop prefix
          
          Write-Host "=== Scoop Status ===" -ForegroundColor Cyan
          Write-Host "Path: $scoopPath"
          Write-Host "Version: $(scoop version)"
          Write-Host "SCOOP_GH_PROXY: $env:SCOOP_GH_PROXY"
          
          Write-Host "`n=== Patches ===" -ForegroundColor Cyan
          "$scoopPath\lib\download.ps1", "$scoopPath\bin\scoop.ps1" | ForEach-Object {
            if (Test-Path $_) {
              $content = Get-Content $_ -Raw
              $name = Split-Path $_ -Leaf
              if ($content -match 'SCOOP_GH_PROXY') {
                Write-Host "[OK] $name patched" -ForegroundColor Green
              } else {
                Write-Host "[FAIL] $name not patched" -ForegroundColor Red
              }
            }
          }
          
          Write-Host "`n=== Buckets ===" -ForegroundColor Cyan
          scoop bucket list
          
          Write-Host "`n=== Apps ===" -ForegroundColor Cyan
          scoop list | Select-Object -First 10

      - name: Test app install
        shell: pwsh
        run: |
          Write-Host "Installing test apps..." -ForegroundColor Cyan
          scoop install 7zip git aria2 2>&1
          
          $apps = @('7z', 'git', 'aria2c')
          foreach ($app in $apps) {
            $path = scoop which $app
            if ($path) {
              Write-Host "[OK] $app installed: $path" -ForegroundColor Green
            } else {
              Write-Host "[WARN] $app not found" -ForegroundColor Yellow
            }
          }
