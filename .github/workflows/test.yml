name: Test

on:
  push:
    paths:
      - 'install.ps1'
      - 'profile.ps1'
  pull_request:
    paths:
      - 'install.ps1'
      - 'profile.ps1'
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run install.ps1 and test
        shell: pwsh
        run: |
          # Add Scoop to PATH
          $scoopShims = "$env:USERPROFILE\scoop\shims"
          if (Test-Path $scoopShims) {
            $env:Path = "$scoopShims;$env:Path"
          }
          
          Write-Host "=== Running install.ps1 ===" -ForegroundColor Cyan
          .\install.ps1 2>&1
          
          # Refresh PATH after install
          if (Test-Path $scoopShims) {
            $env:Path = "$scoopShims;$env:Path"
          }
          
          Write-Host "`n=== Scoop Status ===" -ForegroundColor Cyan
          Write-Host "Path: $(scoop prefix)"
          Write-Host "Version: $(scoop version)"
          Write-Host "SCOOP_GH_PROXY: $env:SCOOP_GH_PROXY"
          
          Write-Host "`n=== Buckets ===" -ForegroundColor Cyan
          scoop bucket list
          
          Write-Host "`n=== Install test apps ===" -ForegroundColor Cyan
          scoop install 7zip git aria2 2>&1
          
          $apps = @('7z', 'git', 'aria2c')
          foreach ($app in $apps) {
            $path = scoop which $app
            if ($path) {
              Write-Host "[OK] $app" -ForegroundColor Green
            } else {
              Write-Host "[WARN] $app not found" -ForegroundColor Yellow
            }
          }
          
          Write-Host "`n=== Bucket add test ===" -ForegroundColor Cyan
          scoop bucket add extras 2>&1
          if ((scoop bucket list) -match 'extras') {
            Write-Host "[OK] extras bucket" -ForegroundColor Green
          }
          
          Write-Host "`n=== Download test ===" -ForegroundColor Cyan
          scoop download sharex 2>&1
